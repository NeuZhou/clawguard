# ClawGuard PR Comment
# Posts scan findings as a PR comment for quick review
name: ClawGuard PR Review

on:
  pull_request:
    branches: [main]

permissions:
  pull-requests: write
  contents: read

jobs:
  security-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ClawGuard
        run: npm install -g @neuzhou/clawguard

      - name: Run Scan
        id: scan
        run: |
          set +e
          clawguard scan . --format json > results.json 2>&1
          EXIT_CODE=$?

          # Extract summary
          TOTAL=$(jq '.summary.total // 0' results.json)
          CRITICAL=$(jq '.summary.critical // 0' results.json)
          HIGH=$(jq '.summary.high // 0' results.json)
          WARNING=$(jq '.summary.warning // 0' results.json)

          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT
          echo "warning=$WARNING" >> $GITHUB_OUTPUT
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

          # Build markdown comment body
          {
            echo 'comment<<EOF'
            echo '## 🛡️ ClawGuard Security Scan'
            echo ''
            if [ "$TOTAL" -eq 0 ]; then
              echo '✅ **No security findings detected!**'
            else
              echo '| Severity | Count |'
              echo '|----------|-------|'
              echo "| 🔴 Critical | $CRITICAL |"
              echo "| 🟠 High | $HIGH |"
              echo "| 🟡 Warning | $WARNING |"
              echo "| **Total** | **$TOTAL** |"
              echo ''
              # Show top 5 findings
              echo '### Top Findings'
              echo '```'
              jq -r '.findings[:5][] | "[\(.severity)] \(.rule): \(.message) (\(.file):\(.line))"' results.json 2>/dev/null || echo "See full report for details"
              echo '```'
            fi
            echo ''
            echo '*Scanned by [ClawGuard](https://github.com/neuzhou/clawguard)*'
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const body = `${{ steps.scan.outputs.comment }}`;
            // Find existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('ClawGuard Security Scan')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
