name: 'ClawGuard Security Scanner'
description: 'Scan agent skills, MCP configs, and AI pipelines for security threats'
author: 'NeuZhou'

branding:
  icon: 'shield'
  color: 'red'

inputs:
  path:
    description: 'Path to scan (file or directory)'
    required: false
    default: '.'
  format:
    description: 'Output format: text, json, or sarif'
    required: false
    default: 'sarif'
  severity-threshold:
    description: 'Minimum severity to fail the step: critical, high, warning, info'
    required: false
    default: 'high'
  rules:
    description: 'Path to custom rules file (JSON/YAML)'
    required: false
    default: ''

outputs:
  findings-count:
    description: 'Total number of security findings'
  critical-count:
    description: 'Number of critical findings'
  high-count:
    description: 'Number of high findings'
  sarif-file:
    description: 'Path to SARIF output file (if format=sarif)'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install ClawGuard
      shell: bash
      run: npm install -g @neuzhou/clawguard

    - name: Run Security Scan
      id: scan
      shell: bash
      run: |
        set +e
        RULES_ARG=""
        if [ -n "${{ inputs.rules }}" ]; then
          RULES_ARG="--rules ${{ inputs.rules }}"
        fi

        if [ "${{ inputs.format }}" = "sarif" ]; then
          clawguard scan "${{ inputs.path }}" --format sarif $RULES_ARG > clawguard-results.sarif 2>&1
          echo "sarif-file=clawguard-results.sarif" >> $GITHUB_OUTPUT
        fi

        # Always run text format for summary
        OUTPUT=$(clawguard scan "${{ inputs.path }}" --format json $RULES_ARG 2>&1)

        CRITICAL=$(echo "$OUTPUT" | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));console.log(d.summary?.critical||0)" 2>/dev/null || echo 0)
        HIGH=$(echo "$OUTPUT" | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));console.log(d.summary?.high||0)" 2>/dev/null || echo 0)
        TOTAL=$(echo "$OUTPUT" | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));console.log(d.summary?.total||0)" 2>/dev/null || echo 0)

        echo "findings-count=$TOTAL" >> $GITHUB_OUTPUT
        echo "critical-count=$CRITICAL" >> $GITHUB_OUTPUT
        echo "high-count=$HIGH" >> $GITHUB_OUTPUT

        # Write Step Summary
        echo "## 🛡️ ClawGuard Security Scan Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
        echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| 🔴 Critical | $CRITICAL |" >> $GITHUB_STEP_SUMMARY
        echo "| 🟠 High | $HIGH |" >> $GITHUB_STEP_SUMMARY
        echo "| Total | $TOTAL |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        # Check threshold
        THRESHOLD="${{ inputs.severity-threshold }}"
        FAIL=0
        case "$THRESHOLD" in
          critical) [ "$CRITICAL" -gt 0 ] && FAIL=1 ;;
          high)     [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ] && FAIL=1 ;;
          warning)  [ "$TOTAL" -gt 0 ] && FAIL=1 ;;
          info)     [ "$TOTAL" -gt 0 ] && FAIL=1 ;;
        esac

        if [ "$FAIL" -eq 1 ]; then
          echo "::error::ClawGuard found findings at or above '$THRESHOLD' severity"
          echo "❌ **Scan failed** — findings at or above \`$THRESHOLD\` severity detected." >> $GITHUB_STEP_SUMMARY
          exit 1
        else
          echo "✅ **Scan passed** — no findings at or above \`$THRESHOLD\` severity." >> $GITHUB_STEP_SUMMARY
        fi

    - name: Upload SARIF (if applicable)
      if: inputs.format == 'sarif' && always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: clawguard-results.sarif
      continue-on-error: true
